<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lia Vendas Dia 30</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06111f;
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .chat {
      width: 100%;
      max-width: 600px;
      background: #0b1728;
      border: 1px solid #00c8d7;
      border-radius: 18px;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #22d3ee;
    }

    #messages {
      min-height: 400px;
      max-height: 500px;
      overflow-y: auto;
      padding: 10px;
      background: #050c17;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .msg {
      margin: 10px 0;
      white-space: pre-line;
      line-height: 1.4;
    }

    .user {
      color: #ffffff;
      text-align: right;
    }

    .lia {
      color: #7dd3fc;
      text-align: left;
    }

    /* Reduz fonte da lista inicial de procedimentos da Lia */
    .lia.lia-inicial {
      font-size: 13px;
      line-height: 1.28;
      word-break: keep-all;
      white-space: pre-line;
    }
    @media (min-width: 600px) {
      .lia.lia-inicial {
        font-size: 13px;
        line-height: 1.28;
        word-break: keep-all;
        white-space: pre-line;
      }
    }
    }

    .input-area {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: #00c8d7;
      color: #06111f;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="chat">
    <h1>Lia CR Laser®</h1>

    <div id="messages"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Digite sua mensagem..." />
      <button onclick="enviarMensagem()">Enviar</button>
    </div>
  </div>

  <!-- Botão fixo WhatsApp das unidades -->
  <button id="btn-whatsapp-unidades" onclick="abrirModalWhatsapp()" aria-label="WhatsApp das unidades">
    WhatsApp das unidades
  </button>

  <!-- Modal WhatsApp das unidades -->
  <div id="modal-whatsapp-unidades" class="modal-whatsapp" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-whatsapp">
    <div class="modal-whatsapp-content">
      <button class="modal-whatsapp-close" onclick="fecharModalWhatsapp()" aria-label="Fechar">&times;</button>
      <h2 id="titulo-modal-whatsapp">Escolha a unidade</h2>
      <ul class="modal-whatsapp-list">
        <li><a href="https://wa.me/5561981316493" target="_blank" rel="noopener">Brasília</a></li>
        <li><a href="https://wa.me/5519991818366" target="_blank" rel="noopener">Campinas</a></li>
        <li><a href="https://wa.me/5562985499102" target="_blank" rel="noopener">Goiânia</a></li>
        <li><a href="https://wa.me/5563981226319" target="_blank" rel="noopener">Palmas</a></li>
        <li><a href="https://wa.me/5511967292039" target="_blank" rel="noopener">São Paulo</a></li>
      </ul>
    </div>
  </div>

  <script src="./lia.js"></script>
  <script>
    function abrirModalWhatsapp() {
      document.getElementById('modal-whatsapp-unidades').style.display = 'flex';
    }
    function fecharModalWhatsapp() {
      document.getElementById('modal-whatsapp-unidades').style.display = 'none';
    }
    // Fechar modal ao clicar fora do conteúdo
    window.addEventListener('click', function(event) {
      const modal = document.getElementById('modal-whatsapp-unidades');
      if (event.target === modal) fecharModalWhatsapp();
    });
  </script>
</body>
</html>
