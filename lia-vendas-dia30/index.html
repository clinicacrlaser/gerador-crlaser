<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lia Vendas Dia 30</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06111f;
      color: white;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .chat {
      width: 100%;
      max-width: 520px;
      background: #0b1728;
      border: 1px solid #00c8d7;
      border-radius: 18px;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #22d3ee;
    }

    #messages {
      min-height: 400px;
      max-height: 500px;
      overflow-y: auto;
      padding: 10px;
      background: #050c17;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .msg {
      margin: 10px 0;
      white-space: pre-line;
      line-height: 1.4;
    }

    .user {
      color: #ffffff;
      text-align: right;
    }

    .lia {
      color: #7dd3fc;
      text-align: left;
    }

    .input-area {
      display: flex;
      gap: 8px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      background: #00c8d7;
      color: #06111f;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="chat">
    <h1>Lia CR Laser®</h1>

    <div id="messages"></div>

    <div class="input-area">
      <input id="userInput" placeholder="Digite sua mensagem..." />
      <button onclick="enviarMensagem()">Enviar</button>
    </div>
  </div>

  <script src="./lia.js"></script>
</body>
</html>
