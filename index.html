  <style>
    #popupOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);

      text-align: center;

    #popupClose {

      top: 14px;
      right: 16px;
      background: none;
      border: none;
      color: #B8C2D1;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s;

    #popupClose:hover { color: #18C7D1; }
    #popupBox .popup-icon { font-size: 32px; margin-bottom: 12px; }
    #popupBox h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #F5F7FA;
      margin: 0 0 16px;
      letter-spacing: 0.04em;
    }

    }
    #popupBox p strong { color: #18C7D1; }
    #popupBox .popup-divider {
      border: none;
      border-top: 1px solid rgba(24,199,209,0.18);
      margin: 20px 0;
    }
    #popupOk {
      background: linear-gradient(100deg, #1E5FAF, #0F6CBD, #18C7D1);

      <h2>ATENÇÃO</h2>
      <p>Oferta válida somente até <strong>24/04/2026</strong>.</p>
      <p style="font-size: 0.82rem; white-space: nowrap;">Após essa data, os valores podem sofrer alteração.</p>

  <button id="installAppButton" class="install-app-btn" type="button" hidden>
    Instalar app
  </button>

  <script src="script.js?v=2"></script>
  <script>
    var deferredPrompt;
    var installAppButton = document.getElementById('installAppButton');

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js');
      });
    }

    function hideInstallButton() {
      if (installAppButton) {
        installAppButton.hidden = true;
      }
    }

    function showInstallButton() {
      if (installAppButton) {
        installAppButton.hidden = false;
      }
    }

    function promptPwaInstall() {
      if (!deferredPrompt) {
        return;
      }

      deferredPrompt.prompt();

      deferredPrompt.userChoice.then(function() {
        deferredPrompt = null;
        hideInstallButton();
      });
    }

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      showInstallButton();

      setTimeout(function() {
        if (deferredPrompt) {
          promptPwaInstall();
        }
      }, 3000);
    });

    window.addEventListener('appinstalled', function() {
      deferredPrompt = null;
      hideInstallButton();
    });

    if (installAppButton) {
      installAppButton.addEventListener('click', function() {
        promptPwaInstall();
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      var overlay = document.getElementById('popupOverlay');
      if (overlay) overlay.style.display = 'flex';
    });
    document.getElementById('popupClose').addEventListener('click', function() {
      document.getElementById('popupOverlay').style.display = 'none';
    });
    document.getElementById('popupOk').addEventListener('click', function() {
      document.getElementById('popupOverlay').style.display = 'none';
    });
  </script>
