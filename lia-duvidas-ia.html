<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lia - Assistente Virtual | CR Laser®</title>
  <link href="https://fonts.googleapis.com/css?family=Inter:400,600&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    body {
      background: #10131a;
      color: #eafaff;
      font-family: 'Inter', Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      overflow: hidden;
    }
    .lia-title {
      font-size: 2rem;
      font-weight: 700;
      color: #18c7d1;
      margin-top: 40px;
      margin-bottom: 12px;
      letter-spacing: 0.01em;
      text-align: center;
    }
    .lia-chat-container {
      background: #181e2a;
      border-radius: 18px;
      box-shadow: 0 4px 24px #0008;
      width: 100%;
      max-width: 420px;
      margin: 0 0 40px 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }
    .lia-messages {
      flex: 1 1 0%;
      padding: 18px 16px 12px 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #181e2a;
      min-height: 0;
      max-height: 100%;
    }
    .lia-msg {
      max-width: 90%;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 1rem;
      line-height: 1.5;
      word-break: break-word;
      margin-bottom: 2px;
    }
    .lia-msg.lia {
      background: linear-gradient(90deg, #18c7d1 0%, #1e5faf 100%);
      color: #fff;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .lia-msg.user {
      background: #232b3d;
      color: #eafaff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .lia-input-row {
      display: flex;
      flex-shrink: 0;
      padding: 12px 12px 12px 12px;
      background: #151a23;
      border-top: 1px solid #1e5faf33;
      z-index: 2;
    }
    .lia-input-row input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      background: #232b3d;
      color: #eafaff;
      outline: none;
      margin-right: 8px;
    }
    .lia-input-row button {
      background: linear-gradient(90deg, #18c7d1 0%, #1e5faf 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .lia-input-row button:active {
      background: #18c7d1;
    }
    @media (max-width: 600px) {
      .lia-chat-container {
        max-width: 100vw;
        min-height: 100vh;
        height: 100vh;
        border-radius: 0;
        margin: 0;
      }
      .lia-title {
        font-size: 1.3rem;
        margin-top: 18px;
      }
      body {
        padding: 0;
        height: 100vh;
        min-height: 100vh;
        overflow: hidden;
      }
      .lia-messages {
        padding-bottom: 8px;
      }
      .lia-input-row {
        padding: 10px 6px 10px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="lia-title">Lia - Assistente Virtual</div>
  <div class="lia-chat-container">
    <div class="lia-messages" id="liaMessages"></div>
    <form class="lia-input-row" id="liaForm" autocomplete="off">
      <input type="text" id="liaInput" placeholder="Digite sua dúvida..." autocomplete="off" required />
      <button type="submit">Enviar</button>
    </form>
  </div>
  <script src="lia-duvidas-ia.js"></script>
</body>
</html>
